<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D Dungeon RPG</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        
        /* UI для исследования */
        #explore-ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
        
        /* UI для пошаговой битвы */
        #battle-ui { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; 
            background: rgba(0, 0, 0, 0.85); border-top: 3px solid #aaa;
            display: none; color: white; padding: 20px; box-sizing: border-box;
        }
        .battle-btn {
            padding: 15px 30px; font-size: 20px; cursor: pointer; 
            background: #333; color: white; border: 2px solid #888; margin-right: 10px;
        }
        .battle-btn:hover { background: #555; }
        #battle-log { margin-top: 15px; font-size: 18px; color: #ffaa00; }
    </style>
</head>
<body>
    <div id="explore-ui">
        <h2>Подземелье</h2>
        <p>WASD - движение</p>
        <p style="color: #ff4444">Столкнись с красным кубом!</p>
    </div>

    <div id="battle-ui">
        <h2>ПОШАГОВАЯ БИТВА</h2>
        <div>
            <button class="battle-btn" onclick="playerAction('attack')">⚔️ Атака</button>
            <button class="battle-btn" onclick="playerAction('flee')">🏃 Бегство</button>
        </div>
        <div id="battle-log">Ваш ход!</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 1. НАСТРОЙКА 3D ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        scene.fog = new THREE.Fog(0x111111, 10, 25); // Туман для атмосферы

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Свет
        scene.add(new THREE.AmbientLight(0x404040, 0.3));
        const torchLight = new THREE.PointLight(0xffaa00, 1.5, 20);
        torchLight.position.set(0, 3, 0);
        torchLight.castShadow = true;
        scene.add(torchLight);

        // Пол
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 30),
            new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Стены (кубики для декора)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
        for (let i = -10; i <= 10; i += 2) {
            addWall(i, -10);
            addWall(i, 10);
            addWall(-10, i);
            addWall(10, i);
        }
        function addWall(x, z) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), wallMat);
            wall.position.set(x, 1, z);
            wall.castShadow = true; wall.receiveShadow = true;
            scene.add(wall);
        }

        // --- 2. ИГРОК И МОБ ---
        const player = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, 1.2, 0.8),
            new THREE.MeshStandardMaterial({ color: 0x4CAF50 })
        );
        player.position.y = 0.6;
        player.castShadow = true;
        scene.add(player);

        const enemy = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1.5, 1),
            new THREE.MeshStandardMaterial({ color: 0xCC0000 })
        );
        enemy.position.set(4, 0.75, 2);
        enemy.castShadow = true;
        scene.add(enemy);

        // --- 3. ЛОГИКА ИГРЫ ---
        let gameState = 'explore'; // 'explore' или 'battle'
        let keys = {};
        let playerHP = 100;
        let enemyHP = 50;

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // --- 4. ОБНОВЛЕНИЕ (ГЕЙМПЛЕЙ) ---
        function update() {
            if (gameState === 'explore') {
                updateExploration();
                checkBattleStart();
            }
            
            // Камера плавно следует за игроком
            camera.position.x += (player.position.x - camera.position.x + 5) * 0.05;
            camera.position.z += (player.position.z - camera.position.z + 8) * 0.05;
            camera.lookAt(player.position.x, 0, player.position.z);

            torchLight.position.x = player.position.x;
            torchLight.position.z = player.position.z;
        }

        function updateExploration() {
            const speed = 0.1;
            let moveX = 0, moveZ = 0;

            if (keys['w'] || keys['ц']) moveZ = -speed;
            if (keys['s'] || keys['ы']) moveZ = speed;
            if (keys['a'] || keys['ф']) moveX = -speed;
            if (keys['d'] || keys['в']) moveX = speed;

            // Простая проверка столкновений со стенами (чтобы не выходить за границы 9х9)
            let nextX = player.position.x + moveX;
            let nextZ = player.position.z + moveZ;
            if (nextX > -9 && nextX < 9) player.position.x = nextX;
            if (nextZ > -9 && nextZ < 9) player.position.z = nextZ;
        }

        function checkBattleStart() {
            const dist = Math.hypot(player.position.x - enemy.position.x, player.position.z - enemy.position.z);
            if (dist < 1.5) {
                startBattle();
            }
        }

        // --- 5. ПОШАГОВАЯ БИТВА ---
        function startBattle() {
            gameState = 'battle';
            document.getElementById('explore-ui').style.display = 'none';
            document.getElementById('battle-ui').style.display = 'block';
            document.getElementById('battle-log').innerText = "Враг впереди! Ваш ход.";
            
            // Слегка откидываем игрока назад, чтобы не застревать в мобе
            player.position.z -= 1;
        }

        window.playerAction = function(action) {
            if (gameState !== 'battle') return;

            if (action === 'attack') {
                const damage = Math.floor(Math.random() * 20) + 10; // 10-30 урона
                enemyHP -= damage;
                document.getElementById('battle-log').innerText = `Вы ударили врага на ${damage} урона! (У врага: ${Math.max(0, enemyHP)} ХП)`;

                if (enemyHP <= 0) {
                    setTimeout(() => endBattle(true), 1000);
                    return;
                }
                
                // Ход врага (задержка для эффекта)
                setTimeout(enemyTurn, 1000);

            } else if (action === 'flee') {
                const success = Math.random() > 0.5; // 50% шанс сбежать
                if (success) {
                    document.getElementById('battle-log').innerText = "Вы сбежали!";
                    setTimeout(() => endBattle(false), 1000);
                } else {
                    document.getElementById('battle-log').innerText = "Сбежать не удалось!";
                    setTimeout(enemyTurn, 1000);
                }
            }

            // Блокируем кнопки на время хода
            document.querySelectorAll('.battle-btn').forEach(btn => btn.disabled = true);
        };

        function enemyTurn() {
            const damage = Math.floor(Math.random() * 15) + 5; // 5-20 урона
            playerHP -= damage;
            document.getElementById('battle-log').innerText = `Враг ударил вас на ${damage} урона! (У вас: ${Math.max(0, playerHP)} ХП)`;

            if (playerHP <= 0) {
                setTimeout(() => {
                    alert("Вы погибли! Игра начнется заново.");
                    playerHP = 100; enemyHP = 50;
                    endBattle(false);
                }, 1000);
            } else {
                // Разблокируем кнопки для следующего хода игрока
                document.querySelectorAll('.battle-btn').forEach(btn => btn.disabled = false);
            }
        }

        function endBattle(enemyKilled) {
            gameState = 'explore';
            document.getElementById('explore-ui').style.display = 'block';
            document.getElementById('battle-ui').style.display = 'none';
            document.querySelectorAll('.battle-btn').forEach(btn => btn.disabled = false);

            if (enemyKilled) {
                scene.remove(enemy); // Убираем моба с 3D-карты
                // В мультиплеере здесь Хост отправит: { type: 'enemy_dead', id: 1 }
            }
        }

        // --- 6. ГЛАВНЫЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            update();
            
            // Простая анимация врага (парение)
            if (enemy.parent) {
                enemy.position.y = 0.75 + Math.sin(Date.now() * 0.005) * 0.2;
                enemy.rotation.y += 0.02;
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
